# Self-contained: gitleaks rejects extend.path together with extend.useDefault,
# and an extending config REPLACES the base's allowlists rather than adding to
# them, so a repo that needs one entry has to restate the rest.
#
# Every allowlist targets generic-api-key alone — the entropy heuristic. The
# provider-specific rules (AWS, GitHub, Stripe, ...) stay active everywhere,
# including in tests, where a real cloud credential is never acceptable.

[extend]
useDefault = true

[[allowlists]]
description = "Checksum manifests: digests are high-entropy by construction."
targetRules = ["generic-api-key"]
paths = ['''(^|/)(buf|go)\.sum$''', '''(^|/)pnpm-lock\.yaml$''']

[[allowlists]]
description = "Go test fixtures: keys generated per test, granting nothing."
targetRules = ["generic-api-key"]
paths = ['''_test\.go$''']

[[allowlists]]
description = "The fixed local-development master key, matched by value so any other high-entropy string in the same files is still reported."
targetRules = ["generic-api-key"]
regexes = ['''fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca''']

