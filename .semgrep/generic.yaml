# Conventions that hold in EVERY Go repo in both orgs — services, golib, jwt,
# and the stack CLI alike. Nothing here may assume the clean-architecture layout;
# service-only rules live in service.yaml.
#
# Scope discipline: a rule belongs here only if no golangci-lint linter already
# covers it. `spancheck` owns span lifecycle, `containedctx` owns contexts in
# structs, `errorlint`/`errname`/`errcheck` own error handling, `depguard` owns
# import direction. Duplicating them costs a second place to fix a false positive.
#
# Suppress a single finding with `// nosemgrep: <rule-id>` on the line or the one
# above it. Prefer that over widening a rule's exclude list.

rules:
  # write-go: "Always the composite-literal form, never new(T)." Two spellings of
  # the same thing read as two intentions.
  - id: agora-no-new-builtin
    languages: [go]
    severity: ERROR
    message: "Use `&$T{}` instead of `new($T)` — the composite literal is the single accepted form."
    paths:
      exclude:
        - "*_test.go"
        - "**/mocks/"
        - "**/protogen/"
    pattern: "new($T)"

  # write-go: "Contexts flow downward only — caller to callee. Never return one."
  # A returned context outlives the call that scoped it.
  - id: agora-no-context-return
    languages: [go]
    severity: ERROR
    message: >-
      $F returns a context.Context. Contexts flow downward only — pass one as the
      first parameter instead of handing one back up.
    paths:
      exclude:
        - "*_test.go"
        - "**/mocks/"
        - "**/protogen/"
    patterns:
      - pattern-either:
          - pattern: "func $F(...) context.Context { ... }"
          - pattern: "func ($R $T) $F(...) context.Context { ... }"
          - pattern: "func $F(...) (context.Context, $ERR) { ... }"
      # Opening a span legitimately returns the derived context.
      - pattern-not-inside: |
          func $F(...) (context.Context, $ERR) {
            ...
            otel.Tracer().Start(...)
            ...
          }

  # write-go, Secrets: "Never log, trace, or put in span attributes: passwords,
  # tokens, API keys, private keys ... Record identifiers only." A span attribute
  # is the easiest of these to add by reflex and the hardest to notice later.
  - id: agora-no-secret-in-span-attribute
    languages: [go]
    severity: ERROR
    message: >-
      Span attribute "$KEY" names credential material. Traces are retained and
      widely readable — record an identifier (`user.id`, `key.id`) instead.
    paths:
      exclude:
        - "*_test.go"
    patterns:
      - pattern-either:
          - pattern: attribute.String($KEY, ...)
          - pattern: attribute.StringSlice($KEY, ...)
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i).*(password|passwd|secret|token|apikey|api_key|privatekey|private_key|credential|ciphertext|signature|bearer).*
