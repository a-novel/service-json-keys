syntax = "proto3";

// StatusService returns the health of the gRPC server dependencies.
service StatusService {
  // Returns the current health of all server dependencies checked at request time.
  rpc Status(StatusRequest) returns (StatusResponse);
}

// DependencyStatus classifies the result of a health check for a single external dependency.
enum DependencyStatus {
  // DEPENDENCY_STATUS_UNSPECIFIED means the application has failed to, or has not yet
  // assessed the status of the given dependency.
  DEPENDENCY_STATUS_UNSPECIFIED = 0;
  // DEPENDENCY_STATUS_UP means the dependency was successfully pinged, and
  // should serve normally.
  DEPENDENCY_STATUS_UP = 1;
  // DEPENDENCY_STATUS_DOWN means the dependency health check failed; the dependency
  // may be unavailable or unreachable.
  DEPENDENCY_STATUS_DOWN = 2;
}

// DependencyHealth reports the health of a single external dependency.
//
// The message carries the status alone. Health-check errors embed internal hostnames, ports and
// schema names, and this gRPC surface may not stay internal forever. The underlying error is
// recorded on the trace span for operators.
message DependencyHealth {
  // Reserved so a future field cannot re-introduce a raw error string and re-open the leak.
  reserved 2;
  reserved "err";

  // The dependency's current operational status.
  DependencyStatus status = 1;
}

// StatusRequest carries no parameters; the server checks all dependencies automatically.
message StatusRequest {}

// StatusResponse reports the health of all service dependencies checked at request time.
message StatusResponse {
  // The health of the PostgreSQL database dependency.
  DependencyHealth postgres = 1;
}
