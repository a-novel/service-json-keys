version: "2"

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
  settings:
    gci:
      sections:
        - standard # Standard section: captures all standard packages.
        - default # Default section: contains all imports that could not be matched to another section type.
        - prefix(github.com/a-novel-kit)
        - prefix(github.com/a-novel)
        - localmodule

linters:
  default: none
  enable: # https://golangci-lint.run/docs/configuration/file/
    #    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    #    - cyclop
    - decorder
    - depguard
    - dogsled
    #    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    #    - exhaustive
    #    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funcorder
    #    - funlen
    #    - ginkgolinter
    - gocheckcompilerdirectives
    #    - gochecknoglobals
    #    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    #    - godox
    - goheader
    - gomoddirectives
    #    - gomodguard
    - goprintffuncname
    - gosec
    #    - gosmopolitan
    - govet
    - grouper
    #    - importas
    - inamedparam
    - interfacebloat
    - ireturn
    - ineffassign
    #    - interfacebloat
    - intrange
    - iotamixing
    #    - ireturn
    - lll
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - musttag
    - nakedret
    #    - nestif
    - nilerr
    - nilnesserr
    #    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    #    - promlinter
    - protogetter
    - reassign
    - revive
    - recvcheck
    #    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    #    - varnamelen
    - wastedassign
    - whitespace
    #    - wrapcheck
    #    - wsl
    - wsl_v5
    - zerologlint

  settings:
    revive:
      rules:
        # write-go: multi-word file names are camelCase, never snake_case. The
        # layer prefixes (pg.*, rest.*, grpc.*, *.config.go) are dot-separated,
        # so a dot is legal between segments; an underscore inside one is not.
        # Which prefixes a layer allows is a judgement call, deliberately left
        # to review rather than encoded here.
        - name: filename-format
          arguments: ['^[a-z][a-zA-Z0-9]*(\.[a-z][a-zA-Z0-9]*)*(_test)?\.go$']

    # write-go-service: "One method per interface, named Exec." The dependency
    # interfaces are single-method by construction; this bounds the drift.
    interfacebloat:
      max: 3

    tagliatelle:
      case:
        rules:
          json: goCamel
          yaml: goCamel

    # write-go's layer-relative rule: every layer holding a span records every
    # error it sees. Only `end` is on by default; the other two are the rule.
    spancheck:
      checks:
        - end
        - record-error
        - set-status
      # golib wraps the two calls spancheck looks for: ReportError does
      # RecordError + SetStatus(Error), and the ReportSuccess pair closes the
      # happy path. Without these it flags every correctly-instrumented return.
      ignore-check-signatures:
        - "otel.ReportError"
        - "otel.ReportSuccess"
        - "otel.ReportSuccessNoContent"

    # Layer import direction, one-way and strict (write-go-service):
    #   config, lib -> nothing internal
    #   dao         -> config, lib
    #   core        -> config, lib, dao
    #   handlers    -> config, lib, core
    # Handlers never reach dao; core never reaches handlers; proto-generated
    # types never enter core or dao — handlers own the proto<->core mapping.
    depguard:
      rules:
        dao:
          files: ["**/internal/dao/**"]
          deny:
            - pkg: "github.com/a-novel/service-json-keys/v2/internal/core"
              desc: dao is below core; the interface belongs to the consumer
            - pkg: "github.com/a-novel/service-json-keys/v2/internal/handlers"
              desc: dao is below handlers
        core:
          files: ["**/internal/core/**"]
          deny:
            - pkg: "github.com/a-novel/service-json-keys/v2/internal/handlers"
              desc: core is below handlers
            - pkg: "github.com/a-novel/service-json-keys/v2/internal/handlers/protogen"
              desc: proto types never enter core; handlers own the mapping
        handlers:
          files: ["**/internal/handlers/**"]
          deny:
            - pkg: "github.com/a-novel/service-json-keys/v2/internal/dao"
              desc: handlers reach dao only through a core service

  exclusions:
    paths:
      - mocks
      - protogen
    rules:
      # pkg/go is the published client facade, not a layer boundary: its
      # interface is broad on purpose, and write-go names it as the documented
      # exception to "return the concrete type" ("a pkg/go client behind an
      # interface").
      - path: pkg/go/
        linters:
          - interfacebloat
          - ireturn
      - path: (.+)_test.go
        linters:
          - forcetypeassert
          - maintidx
          - gocognit
          - gocyclo
          - tagliatelle
          - goconst
          - gocritic
          - err113
          - prealloc
