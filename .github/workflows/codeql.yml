# Managed by `a-novel repo` — CodeQL advanced setup. Regenerated on
# `a-novel repo update`; edit the template in stack, not this copy.
# Languages, query suite and branch are filled from the repo's detected
# languages and class preset.
name: "CodeQL"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: "Analyze (${{ matrix.language }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "go", "javascript-typescript"]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: "${{ matrix.language }}"
          config: |
            queries:
              - uses: security-and-quality
            query-filters:
              - exclude:
                  id: actions/unpinned-tag
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
