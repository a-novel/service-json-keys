# Managed by `a-novel repo update` — edit the template in stack, not this copy.
#
# Human-triggered Epic release train: one dispatch releases every repo a landed
# Epic touched. It reconstructs the `epic:<N>` merged repo set, derives each repo's
# semver bump from its commit history, and drives each repo's own release.yaml
# (rehearse dry, then cut), recording the released tag per repo as a receipt on the
# Epic. It is idempotent: a re-dispatch resumes, releasing only the repos that have
# not shipped yet. Publishing forward, it is fenced by the admin gate plus a
# choice-typed dry_run that defaults on, so a dispatch rehearses the whole train and
# cuts nothing until the operator sets dry_run=false. The heavy lifting and the
# admin gate live in the reusable release-train-run workflow pinned below; this thin
# caller only threads the org credentials and dispatch inputs.
name: release-train

on:
  workflow_dispatch:
    inputs:
      epic_number:
        description: The Epic number N to release (numeric).
        required: true
        type: string
      dry_run:
        description: "true (default) = rehearse every repo, cut nothing; false = actually cut the releases."
        required: false
        default: "true"
        # A choice type makes the UI and the dispatch API reject anything but these
        # two values, so a fat-fingered "false " or "FALSE" cannot silently cut real
        # releases when the operator meant a rehearsal.
        type: choice
        options:
          - "true"
          - "false"

run-name: "🚂 release train epic:#${{ inputs.epic_number }} requested by @${{ github.actor }} (dry_run=${{ inputs.dry_run }})"

jobs:
  release-train:
    # matches the callee; the caller sets the ceiling, so it must not hand down
    # the repository default.
    permissions:
      contents: read
    uses: a-novel-kit/workflows/.github/workflows/release-train-run.yaml@v1.26.1
    with:
      client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
      epic_number: ${{ inputs.epic_number }}
      dry_run: ${{ inputs.dry_run }}
      kill_switch: ${{ vars.AGENT_KILL_SWITCH }}
    secrets:
      app_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
