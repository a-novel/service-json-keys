# Managed by `a-novel repo update` — edit the template in stack, not this copy.
#
# Human-triggered Epic ROLLBACK (a-novel-kit/workflows#235) — the rare escape hatch that
# reverts an Epic's merged siblings across repos and re-lands the compensations atomically.
# It is DESTRUCTIVE (it reverts already-merged code), so it is fenced four ways: it is
# admin-only (workflow_dispatch is open to any write user, so the job fails closed for
# non-admins), it demands a typed confirmation, it defaults to a no-write dry run that just
# prints the plan, and every compensating revert still passes the same merge-gate + review +
# queue + partial-landing detector as the forward landing. The heavy lifting (ledger
# reconstruction, per-repo reverts, atomic landing, board reset) AND the admin/confirmation fences
# all live in the reusable epic-rollback-run workflow (pinned below); this thin caller only threads
# the org creds + the operator's dispatch inputs into it.
name: epic-rollback

on:
  workflow_dispatch:
    inputs:
      epic_number:
        description: The Epic number N to roll back (numeric).
        required: true
        type: string
      confirm:
        description: Type "revert-epic-<N>" exactly (e.g. revert-epic-42) to confirm you are reverting MERGED code.
        required: true
        type: string
      reason:
        description: Why INV-1 is violated (goes into the audit trail + the rollback-epic body).
        required: true
        type: string
      dry_run:
        description: "true (default) = print the plan only; false = actually open + land the reverts."
        required: false
        default: "true"
        # choice (not string): the UI + the dispatch API reject anything but these two values, so a
        # fat-fingered "false " / "FALSE" can't silently run dry when the operator meant to go live.
        type: choice
        options:
          - "true"
          - "false"
      max_rollback_repos:
        description: BLAST-CAP — abort if the rollback would touch more than this many distinct repos (default 5). Raise it deliberately for a genuinely wide rollback.
        required: false
        default: "5"
        type: string

run-name: "⏮ ROLLBACK epic:#${{ inputs.epic_number }} requested by @${{ github.actor }} (dry_run=${{ inputs.dry_run }})"

jobs:
  rollback:
    uses: a-novel-kit/workflows/.github/workflows/epic-rollback-run.yaml@v1.20.2
    with:
      epic_number: ${{ inputs.epic_number }}
      confirm: ${{ inputs.confirm }}
      reason: ${{ inputs.reason }}
      dry_run: ${{ inputs.dry_run }}
      max_rollback_repos: ${{ inputs.max_rollback_repos }}
      client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
      project_id: ${{ github.repository_owner == 'a-novel' && 'PVT_kwDOB9MxdM4BMh8r' || 'PVT_kwDOCy-nAM4BbtKH' }}
      kill_switch: ${{ vars.AGENT_KILL_SWITCH }}
    secrets:
      app_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
