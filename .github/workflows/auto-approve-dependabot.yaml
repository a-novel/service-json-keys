# Managed by `a-novel repo update` — edit the template in stack, not this copy.
#
# Auto-approves pull requests opened by the trusted dependency bots so routine
# version bumps don't wait on a human approval. It is safe on two counts: the PR
# author is a fixed bot identity a contributor cannot impersonate, and the approval
# is withheld the moment a commit by anyone other than that bot lands on the branch,
# so a tampered dependency PR falls back to normal review. Once approved, the PR is
# added to the merge queue so it merges hands-off (the queue owns the method).
name: auto-approve dependencies

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-approve:
    if: >-
      github.event.pull_request.user.login == vars.DEPENDENCY_BOT_LOGIN ||
      github.event.pull_request.user.login == vars.DEPENDABOT_SECURITY_LOGIN
    uses: a-novel-kit/workflows/.github/workflows/auto-approve-dependabot-run.yaml@v1.24.1
    with:
      client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
      dependency_bot_login: ${{ vars.DEPENDENCY_BOT_LOGIN }}
      dependabot_security_login: ${{ vars.DEPENDABOT_SECURITY_LOGIN }}
    secrets:
      bot_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
