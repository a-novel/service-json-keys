name: scan-secrets-sweep

# Catches what the gate cannot: a secret committed and later deleted, which is
# absent from the working tree `scan-secrets` scans.
#
# Verification stays ON here and would not be acceptable on the gate — it calls
# the issuing provider's API, so it can rate-limit, and a flaky required check
# blocks merges. Off the merge path a false alarm only costs an investigation.
# The repo is public, so a live secret reached scraping bots long before this
# runs; one read-only call adds nothing next to knowing whether it still works.

on:
  schedule:
    # Hourly: the window between a secret landing and us knowing is the whole
    # point, and a weekly sweep makes that window a week. Offset off :00 to stay
    # out of the scheduling stampede. Full history each run, so a secret that
    # only becomes detectable when a new detector ships is still caught.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scan-secrets-sweep-${{ github.repository }}
  cancel-in-progress: false

jobs:
  history:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: trufflesecurity/trufflehog:3.95.9
    steps:
      - uses: actions/checkout@v7
        with:
          # The whole point is the history the gate cannot see.
          fetch-depth: 0
          persist-credentials: false
      - name: trufflehog full history
        shell: bash
        run: |
          set -euo pipefail
          # --results=verified only: an unverified hit is a guess, and `unknown`
          # means verification itself failed (rate limit, network), which must
          # never be reported as a finding.
          trufflehog git file://. --results=verified --fail
