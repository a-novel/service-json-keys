# Managed by `a-novel repo update` — edit the template in stack, not this copy.
#
# The required "may this PR merge?" gate, plus the landing coordinator for epic
# members. Two jobs:
#
#   evaluate   — posts the required `merge-gate` check on every PR and on the merge
#                queue's group (the queue validates required checks on the group, so
#                the gate must post there too or a queued PR waits out the timeout and
#                drops). The check is posted by the [Agent] App via the Checks API (a
#                stable integration id the ruleset requires), so the job is only the
#                runner — its id is deliberately NOT `merge-gate`, to avoid a duplicate
#                check name. A standalone PR passes; an epic member holds until every
#                sibling is ready (epic-atomicity).
#
#   auto-merge — enables native auto-merge on an epic member so the whole set lands
#                together once the gate + approval go green. Enabling is safe while the
#                gate is still red — GitHub parks it and merges when green. Live at
#                `dry_run: "false"` — auto-merge is enabled for epic members.
name: merge-gate

on:
  pull_request:
    # labeled/unlabeled fire on any label change; we need them so an `epic:<N>`
    # add/remove re-evaluates membership (non-epic churn just re-posts the same result).
    # ready_for_review/converted_to_draft: draft state flips this PR's own readiness.
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review, converted_to_draft]
  # A review changing (approve/dismiss) can flip this PR's atomicity readiness, so
  # re-evaluate the gate on review events too.
  pull_request_review:
    types: [submitted, dismissed]
  merge_group:

jobs:
  merge-gate:
    uses: a-novel-kit/workflows/.github/workflows/merge-gate-run.yaml@v1.19.4
    with:
      client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
      kill_switch: ${{ vars.AGENT_KILL_SWITCH }}
    secrets:
      app_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
