# Managed by `a-novel repo update` — edit the template in stack, not this copy.
#
# The single required "may this PR merge?" gate. Runs on every PR to the default
# branch, and on the merge queue's group, so the required `merge-gate` check
# reports in both places — the queue validates required checks on the group, so
# the gate must post there too or a queued PR waits out the timeout and drops. The
# check itself is posted by the [Agent] App via the Checks API (a stable
# integration id the ruleset requires), so the job below is only the runner — its
# id is deliberately NOT `merge-gate`, to avoid a duplicate check name.
name: merge-gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # A review changing (approve/dismiss) can flip this PR's atomicity readiness, so
  # re-evaluate the gate on review events too.
  pull_request_review:
    types: [submitted, dismissed]
  merge_group:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    # The gate mints its own [Agent] token (checks:write) and never uses the
    # default token, so it needs no repository permissions of its own.
    permissions: {}
    steps:
      - uses: a-novel-kit/workflows/generic-actions/merge-gate@v1.6.0
        with:
          client_id: ${{ vars.AGENT_BOT_CLIENT_ID }}
          app_private_key: ${{ secrets.AGENT_BOT_PRIVATE_KEY }}
