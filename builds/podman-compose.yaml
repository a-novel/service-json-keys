services:
  # ====================================================================================================================
  # DATABASE
  # ====================================================================================================================

  postgres-json-keys:
    build:
      context: ..
      dockerfile: ./builds/database.Dockerfile
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - api
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - json-keys-postgres-data:/var/lib/postgresql/

  # ====================================================================================================================
  # ONE-SHOT TARGETS
  # ====================================================================================================================

  service-json-keys-migrations:
    profiles: ["migrations"]
    build:
      context: ..
      dockerfile: ./builds/migrations.Dockerfile
    depends_on:
      postgres-json-keys:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
    networks:
      - api

  service-json-keys-rotate-keys:
    profiles: ["rotate-keys"]
    build:
      context: ..
      dockerfile: ./builds/rotate-keys.Dockerfile
    depends_on:
      postgres-json-keys:
        condition: service_healthy
      service-json-keys-migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
      # Local-dev test key — never used in production.
      APP_MASTER_KEY: fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca
    networks:
      - api

  # ====================================================================================================================
  # LONG-RUNNER TARGETS
  # ====================================================================================================================

  service-json-keys-grpc:
    profiles: ["grpc"]
    build:
      context: ..
      dockerfile: ./builds/standalone.grpc.Dockerfile
    ports:
      - "${GRPC_PORT}:8080"
    depends_on:
      postgres-json-keys:
        condition: service_healthy
      service-json-keys-migrations:
        condition: service_completed_successfully
      service-json-keys-rotate-keys:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
      APP_MASTER_KEY: fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca
    networks:
      - api

  service-json-keys-rest:
    profiles: ["rest"]
    build:
      context: ..
      dockerfile: ./builds/standalone.rest.Dockerfile
    ports:
      - "${REST_PORT}:8080"
    depends_on:
      postgres-json-keys:
        condition: service_healthy
      service-json-keys-migrations:
        condition: service_completed_successfully
      service-json-keys-rotate-keys:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
      APP_MASTER_KEY: fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca
    networks:
      - api

networks:
  api:

volumes:
  json-keys-postgres-data:
