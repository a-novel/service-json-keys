services:
  # ====================================================================================================================
  # DATABASE
  # ====================================================================================================================

  postgres-json-keys:
    build:
      context: ..
      dockerfile: ./builds/database.Dockerfile
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - api
    environment:
      # Spec §12.1: inline test-default credentials. The a-novel daemon
      # owns dynamic env (ports, derived URLs, cross-service refs) but
      # NOT constants — those live in the service. Values mirror what
      # every service's CI workflow already hardcodes.
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - json-keys-postgres-data:/var/lib/postgresql/

  # ====================================================================================================================
  # ONE-SHOT TARGETS (run on infra-up, exit when done)
  # ====================================================================================================================

  # migrations: applies the schema. Idempotent — safe to re-run every
  # infra-up. No healthcheck (compose's classifier: long-runners have
  # HEALTHCHECK, one-shots don't).
  service-json-keys-migrations:
    profiles: ["migrations"]
    build:
      context: ..
      dockerfile: ./builds/migrations.Dockerfile
    depends_on:
      postgres-json-keys:
        condition: service_healthy
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
    networks:
      - api

  # rotate-keys: provisions the active key set. Depends on migrations
  # (schema must exist first). Same one-shot semantics.
  service-json-keys-rotate-keys:
    profiles: ["rotate-keys"]
    build:
      context: ..
      dockerfile: ./builds/rotate-keys.Dockerfile
    depends_on:
      postgres-json-keys:
        condition: service_healthy
      service-json-keys-migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
      # Local-dev test key (matches CI workflows). Spec §12.1: constants
      # live in the service. Never used in production.
      APP_MASTER_KEY: fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca
    networks:
      - api

  # ====================================================================================================================
  # LONG-RUNNER TARGETS (rest, grpc)
  # ====================================================================================================================

  # Profiled so a plain `podman compose up` does NOT start it: when the CLI
  # runs this entrypoint locally (go run) it only needs the deps (postgres
  # + the one-shots having succeeded); a containerised copy on the same
  # host ${GRPC_PORT} would collide ("bind: address already in use").
  # `--profile grpc` opts into the dockerised copy instead.
  service-json-keys-grpc:
    profiles: ["grpc"]
    build:
      context: ..
      dockerfile: ./builds/standalone.grpc.Dockerfile
    ports:
      - "${GRPC_PORT}:8080"
    depends_on:
      postgres-json-keys:
        condition: service_healthy
      service-json-keys-migrations:
        condition: service_completed_successfully
      service-json-keys-rotate-keys:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
      APP_MASTER_KEY: fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca
    networks:
      - api

  # Same rationale as grpc above: profiled out of the default `up` so the
  # locally-run REST entrypoint owns ${REST_PORT}. `--profile rest` opts
  # into the dockerised copy.
  service-json-keys-rest:
    profiles: ["rest"]
    build:
      context: ..
      dockerfile: ./builds/standalone.rest.Dockerfile
    ports:
      - "${REST_PORT}:8080"
    depends_on:
      postgres-json-keys:
        condition: service_healthy
      service-json-keys-migrations:
        condition: service_completed_successfully
      service-json-keys-rotate-keys:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: "postgres://postgres:postgres@postgres-json-keys:5432/postgres?sslmode=disable"
      APP_MASTER_KEY: fec0681a2f57242211c559ca347721766f8a3acd8ed2e63b36b3768051c702ca
    networks:
      - api

networks:
  api:

volumes:
  json-keys-postgres-data:
